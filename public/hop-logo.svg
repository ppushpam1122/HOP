<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Peacock icon - geometric origami style matching the reference -->
  <g transform="translate(0, 4)">
    <!-- Body / lower black shape -->
    <polygon points="8,62 28,38 48,62" fill="#111111"/>
    <!-- Left wing - red -->
    <polygon points="4,56 24,28 32,56" fill="#C41E1E"/>
    <!-- Right wing - dark red -->
    <polygon points="28,56 46,28 56,56" fill="#8B1010"/>
    <!-- Top peak / head - red -->
    <polygon points="24,8 38,28 14,36" fill="#C41E1E"/>
    <!-- Middle body piece - black -->
    <polygon points="20,30 38,28 30,50" fill="#111111"/>
    <!-- Beak / head accent - red -->
    <polygon points="36,10 44,20 30,22" fill="#C41E1E"/>
    <!-- Small top detail -->
    <polygon points="30,4 36,14 24,14" fill="#8B1010"/>
  </g>

  <!-- HOP text -->
  <text x="68" y="52" font-family="'Arial Black', 'Montserrat', sans-serif" font-weight="900"
        font-size="44" fill="#111111" letter-spacing="-1">HOP</text>

  <!-- HOUSE OF PEACOCK subtext -->
  <text x="70" y="68" font-family="'Arial', 'Montserrat', sans-serif" font-weight="700"
        font-size="10.5" fill="#C41E1E" letter-spacing="2.5">HOUSE OF PEACOCK</text>
</svg>
